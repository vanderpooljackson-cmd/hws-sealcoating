<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />

  <title>Thanks — HWS Sealcoating</title>
  <meta name="robots" content="noindex">

  <style>
    .thanks { min-height: 100dvh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }

    .thanks p { font-size: 1.1rem; color: var(--color-text-muted); margin-bottom: 1.8rem; }

  <main class="thanks">
    <div class="thanks-card">
      <div class="thanks-check">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h1>Thanks — your request is in.</h1>
